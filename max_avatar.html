<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max — AI Test Engineer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: white; }
    .glow-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(99,102,241,0.15); animation: pulse-ring 4s ease-in-out infinite; }
    .glow-ring:nth-child(1) { width: 500px; height: 500px; } .glow-ring:nth-child(2) { width: 620px; height: 620px; animation-delay: 0.7s; } .glow-ring:nth-child(3) { width: 740px; height: 740px; animation-delay: 1.4s; }
    @keyframes pulse-ring { 0%,100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.04); opacity: 0.6; } }
    .card { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .avatar-wrap { position: relative; width: 220px; height: 220px; }
    .avatar-circle { width: 220px; height: 220px; border-radius: 50%; background: linear-gradient(145deg, #4f46e5, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 88px; font-weight: 800; letter-spacing: -4px; box-shadow: 0 0 0 4px rgba(79,70,229,0.4), 0 0 40px rgba(124,58,237,0.5), 0 20px 60px rgba(0,0,0,0.5); transition: transform 0.15s ease; position: relative; overflow: hidden; }
    .avatar-circle::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.07) 50%, transparent 70%); animation: shimmer 3s linear infinite; }
    @keyframes shimmer { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .speaking-ring { position: absolute; inset: -8px; border-radius: 50%; border: 3px solid #818cf8; opacity: 0; transition: opacity 0.2s; }
    .speaking .speaking-ring { opacity: 1; animation: speaking-pulse 0.6s ease-in-out infinite alternate; }
    @keyframes speaking-pulse { from { transform: scale(1); border-color: #818cf8; } to { transform: scale(1.06); border-color: #a78bfa; box-shadow: 0 0 35px rgba(167,139,250,0.7); } }
    .speaking .avatar-circle { transform: scale(1.03); }
    .listen-dots { display: flex; gap: 6px; position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; }
    .listening .listen-dots { opacity: 1; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: dot-bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-8px); opacity: 1; } }
    .name-block { text-align: center; }
    .name { font-size: 36px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(90deg, #a5b4fc, #e0e7ff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .role { font-size: 15px; color: rgba(199,210,254,0.7); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
    .status-badge { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 99px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; color: rgba(199,210,254,0.8); backdrop-filter: blur(10px); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: status-blink 2s ease-in-out infinite; }
    @keyframes status-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .sound-bars { display: flex; align-items: flex-end; gap: 4px; height: 24px; opacity: 0; transition: opacity 0.3s; }
    .speaking-active .sound-bars { opacity: 1; }
    .bar { width: 4px; border-radius: 2px; background: linear-gradient(to top, #4f46e5, #a78bfa); animation: sound-bar 0.5s ease-in-out infinite alternate; }
    .bar:nth-child(1){height:8px} .bar:nth-child(2){height:16px;animation-delay:.1s} .bar:nth-child(3){height:22px;animation-delay:.05s} .bar:nth-child(4){height:14px;animation-delay:.15s} .bar:nth-child(5){height:10px;animation-delay:.08s}
    @keyframes sound-bar { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
    .powered { position: absolute; bottom: 20px; right: 24px; font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="glow-ring"></div><div class="glow-ring"></div><div class="glow-ring"></div>
  <div class="card" id="avatar-card">
    <div class="avatar-wrap" id="avatar-wrap">
      <div class="avatar-circle">M</div>
      <div class="speaking-ring"></div>
      <div class="listen-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div class="name-block"><div class="name">Max</div><div class="role">AI Test Automation Engineer</div></div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="status-badge" id="status-badge"><div class="status-dot"></div><span id="status-text">Joining standup...</span></div>
      <div class="sound-bars" id="sound-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    </div>
  </div>
  <div class="powered">EVERPERFORM · MAX AI</div>
  <script>
    const wrap=document.getElementById('avatar-wrap'),badge=document.getElementById('status-badge'),status=document.getElementById('status-text'),bars=document.getElementById('sound-bars');
    function setState(s,t){wrap.className='avatar-wrap '+s;badge.className='status-badge '+s;status.textContent=t;s==='speaking'?bars.parentElement.classList.add('speaking-active'):bars.parentElement.classList.remove('speaking-active');}
    function speak(text,onDone){
      if(!('speechSynthesis' in window)){if(onDone)onDone();return;}
      setState('speaking','Speaking...');
      const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.pitch=1.0;u.volume=1.0;
      const voices=window.speechSynthesis.getVoices();
      const pref=voices.find(v=>v.lang.startsWith('en')&&(v.name.includes('Google')||v.name.includes('Samantha')||v.name.includes('Daniel')||v.name.includes('Alex')));
      if(pref)u.voice=pref;
      u.onend=()=>{setState('listening','Listening...');if(onDone)onDone();};
      u.onerror=()=>{setState('listening','Listening...');if(onDone)onDone();};
      window.speechSynthesis.speak(u);
    }
    window.addEventListener('load',()=>{
      const trySpeak=()=>{
        if(window.speechSynthesis.getVoices().length===0){setTimeout(trySpeak,300);return;}
        setTimeout(()=>{speak("Good morning team. I am Max, your AI test automation engineer. I have reviewed this week's sprint tickets and I am ready with my standup update. Just let me know when it is my turn.",()=>{setState('listening','Ready');});},2000);
      };
      window.speechSynthesis.getVoices().length>0?trySpeak():window.speechSynthesis.addEventListener('voiceschanged',trySpeak,{once:true});
    });
    const p=new URLSearchParams(window.location.search);
    if(p.get('say'))setTimeout(()=>speak(decodeURIComponent(p.get('say'))),1500);
  </script>
</body>
</html>
